<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Appendix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f8f3ea;
        --bg-soft: #fffdf7;
        --ink: #1f2a37;
        --ink-soft: #5f6c7b;
        --accent: #1d8f6e;
        --accent-2: #de6b35;
        --line: #d7d2c7;
        --card: #fffdf8;
        --shadow: 0 10px 30px rgba(31, 42, 55, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: radial-gradient(circle at 20% 10%, #fff7e9 0%, var(--bg) 48%, #f2ece2 100%);
        color: var(--ink);
      }

      body {
        font-family: "Space Grotesk", "Noto Sans", sans-serif;
        line-height: 1.6;
      }

      .wrap {
        width: min(1080px, 92vw);
        margin: 0 auto;
        padding: 28px 0 64px;
      }

      header {
        margin-bottom: 24px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: linear-gradient(130deg, var(--bg-soft), #f5f1e8 65%, #ece6db);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .hero {
        padding: 28px 28px 12px;
      }

      .kicker {
        color: var(--accent);
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-size: 0.8rem;
      }

      h1 {
        margin: 8px 0 8px;
        font-family: "Noto Serif SC", serif;
        font-size: clamp(1.6rem, 2.8vw, 2.4rem);
        line-height: 1.2;
      }

      .subtitle {
        margin: 0;
        color: var(--ink-soft);
      }

      .tabs {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.75);
        border-top: 1px solid var(--line);
      }

      .tab-btn {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        border-radius: 999px;
        padding: 10px 14px;
        font-size: 0.95rem;
        font-weight: 500;
        cursor: pointer;
        transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .tab-btn:hover {
        transform: translateY(-1px);
        border-color: var(--accent);
      }

      .tab-btn[aria-selected="true"] {
        background: linear-gradient(120deg, var(--accent), #35a281);
        color: #fff;
        border-color: transparent;
        box-shadow: 0 6px 16px rgba(29, 143, 110, 0.3);
      }

      main {
        margin-top: 20px;
      }

      .panel {
        display: none;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: var(--card);
        padding: 22px;
        box-shadow: var(--shadow);
        animation: fadeUp 0.35s ease;
      }

      .panel.is-active {
        display: block;
      }

      .panel h2 {
        margin-top: 0;
        margin-bottom: 8px;
        font-family: "Noto Serif SC", serif;
      }

      .panel p {
        margin-top: 0;
        color: var(--ink-soft);
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #fff;
        padding: 14px;
      }

      .card h3 {
        margin: 0 0 6px;
        font-size: 1rem;
        text-align: center;
      }

      .card small {
        color: var(--ink-soft);
      }

      .xlsx-wrap {
        margin-top: 10px;
        overflow-x: auto;
        text-align: center;
        background: #fff;
      }

      .xlsx-wrap table {
        width: auto;
        display: inline-table;
        margin: 0 auto;
        border-collapse: collapse;
        font-size: 0.92rem;
        font-family: "Times New Roman", "SimSun", "Songti SC", serif;
      }

      .xlsx-wrap th,
      .xlsx-wrap td {
        border: 1px solid var(--line);
        padding: 8px 10px;
        text-align: center;
        vertical-align: middle;
        white-space: nowrap;
      }

      .xlsx-wrap th {
        background: #fff;
        font-weight: 400;
      }

      .file-note {
        margin-top: 10px;
        font-size: 0.88rem;
        color: var(--ink-soft);
      }

      .placeholder-img {
        width: 100%;
        border-radius: 10px;
        border: 1px dashed #a6b4c0;
        background: repeating-linear-gradient(
          45deg,
          #eef2f6,
          #eef2f6 10px,
          #f7f9fc 10px,
          #f7f9fc 20px
        );
        aspect-ratio: 16 / 10;
        display: grid;
        place-items: center;
        color: #607082;
        font-weight: 600;
      }

      .figure-wrap {
        margin-top: 10px;
      }

      .figure-image {
        display: block;
        max-width: min(100%, 920px);
        width: auto;
        height: auto;
        margin: 0 auto;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
      }

      .panel-item {
        margin-top: 12px;
      }

      .panel-title {
        margin: 0 0 8px;
        text-align: center;
        font-weight: 600;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        font-size: 0.92rem;
        background: #fff;
        color: var(--ink);
        border-radius: 12px;
        padding: 12px;
        border: 1px solid var(--line);
      }

      .tip {
        margin-top: 14px;
        padding: 10px 12px;
        border-left: 4px solid var(--accent-2);
        background: #fff4ed;
        color: #5f381f;
        border-radius: 6px;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 820px) {
        .tabs {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="hero">
          <p class="kicker">Supplementary Materials</p>
          <h1>Online Appendix</h1>
          <p class="subtitle">《生成式人工智能对中国企业的估值影响：基于劳动力需求变化的视角》的附录材料</p>
        </div>

        <nav class="tabs" role="tablist" aria-label="附录内容切换">
          <button class="tab-btn" id="tab-tables" role="tab" aria-selected="true" aria-controls="panel-tables">表格</button>
          <button class="tab-btn" id="tab-figures" role="tab" aria-selected="false" aria-controls="panel-figures">图片</button>
          <button class="tab-btn" id="tab-prompts" role="tab" aria-selected="false" aria-controls="panel-prompts">提示词</button>
          <button class="tab-btn" id="tab-extra" role="tab" aria-selected="false" aria-controls="panel-extra">补充表格</button>
        </nav>
      </header>

      <main>
        <section class="panel is-active" id="panel-tables" role="tabpanel" aria-labelledby="tab-tables">
          <h2>附录：表格</h2>
          <div class="grid" id="tables-container">正在加载预处理表格...</div>
        </section>

        <section class="panel" id="panel-figures" role="tabpanel" aria-labelledby="tab-figures">
          <h2>附录：图片</h2>
          <div class="grid" id="figures-container">正在加载图片...</div>
        </section>

        <section class="panel" id="panel-prompts" role="tabpanel" aria-labelledby="tab-prompts">
          <h2>附录：提示词</h2>
          <div class="grid" id="prompts-container">正在加载提示词...</div>
        </section>

        <section class="panel" id="panel-extra" role="tabpanel" aria-labelledby="tab-extra">
          <h2>附录：补充表格</h2>
          <div class="grid" id="supplements-container">正在加载补充表格...</div>
        </section>
      </main>
    </div>

    <script src="tables.generated.js"></script>
    <script>
      const tabs = Array.from(document.querySelectorAll('[role="tab"]'));
      const panels = Array.from(document.querySelectorAll('[role="tabpanel"]'));

      function extractTableNumber(path) {
        const match = path.match(/table\/(?:.*\/)?table_(\d+)\.xlsx$/i);
        return match ? Number(match[1]) : Number.POSITIVE_INFINITY;
      }

      function renderAllPrebuiltTables(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;

        const tableMap = window.PREBUILT_TABLES || {};
        const nameMap = window.PREBUILT_TABLE_NAMES || {};
        const entries = Object.entries(tableMap)
          .filter(([path]) => path.startsWith('table/table_') && path.endsWith('.xlsx'))
          .sort((a, b) => extractTableNumber(a[0]) - extractTableNumber(b[0]));

        if (entries.length === 0) {
          container.textContent = '未找到表格预处理数据。请先运行 convert_tables.py。';
          return;
        }

        const html = entries
          .map(([path, tableHtml]) => {
            const num = extractTableNumber(path);
            const titleName = Number.isFinite(num) ? nameMap[String(num)] : '';
            const title = Number.isFinite(num)
              ? (titleName ? `表${num}：${titleName}` : `表${num}`)
              : path;
            return `
              <article class="card">
                <h3>${title}</h3>
                <div class="xlsx-wrap">${tableHtml}</div>
              </article>
            `;
          })
          .join('');

        container.innerHTML = html;
      }

      function panelLetter(subnum) {
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        if (subnum >= 1 && subnum <= letters.length) {
          return letters[subnum - 1];
        }
        return String(subnum);
      }

      function renderAllPrebuiltFigures(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;

        const figureGroups = window.PREBUILT_FIGURES || [];
        const figureTitleMap = window.PREBUILT_FIGURE_TITLES || {};
        const panelTitleMap = window.PREBUILT_PANEL_TITLES || {};
        if (figureGroups.length === 0) {
          container.textContent = '未找到图片预处理数据。请先运行 convert_tables.py。';
          return;
        }

        const html = figureGroups
          .map((group) => {
            const figureName = figureTitleMap[String(group.num)] || '';
            const figureTitle = figureName ? `图${group.num}：${figureName}` : `图${group.num}`;

            const mainBlock = group.mainPath
              ? `
                <div class="figure-wrap">
                  <img class="figure-image" src="${group.mainPath}" alt="${figureTitle}" loading="lazy" />
                </div>
              `
              : '';

            const panelBlocks = (group.panels || [])
              .map((panel) => {
                const letter = panelLetter(panel.subnum);
                const panelName = panelTitleMap[`${group.num}_${panel.subnum}`] || '';
                const panelTitle = panelName ? `Panel ${letter}：${panelName}` : `Panel ${letter}`;
                return `
                  <div class="panel-item">
                    <p class="panel-title">${panelTitle}</p>
                    <img class="figure-image" src="${panel.path}" alt="${figureTitle} Panel ${letter}" loading="lazy" />
                  </div>
                `;
              })
              .join('');

            return `
              <article class="card">
                <h3>${figureTitle}</h3>
                ${mainBlock}
                ${panelBlocks}
              </article>
            `;
          })
          .join('');

        container.innerHTML = html;
      }

      function extractPromptNumber(path) {
        const match = path.match(/prompt\/prompt_(\d+)\.md$/i);
        return match ? Number(match[1]) : Number.POSITIVE_INFINITY;
      }

      function renderAllPrebuiltPrompts(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;

        const promptMap = window.PREBUILT_PROMPTS || {};
        const promptTitleMap = window.PREBUILT_PROMPT_TITLES || {};
        const entries = Object.entries(promptMap)
          .filter(([path]) => path.startsWith('prompt/prompt_') && path.endsWith('.md'))
          .sort((a, b) => extractPromptNumber(a[0]) - extractPromptNumber(b[0]));

        if (entries.length === 0) {
          container.textContent = '未找到提示词预处理数据。请先运行 convert_tables.py。';
          return;
        }

        const html = entries
          .map(([path, content]) => {
            const num = extractPromptNumber(path);
            const titleName = Number.isFinite(num) ? promptTitleMap[String(num)] : '';
            const title = Number.isFinite(num)
              ? (titleName ? `Prompt ${num}：${titleName}` : `Prompt ${num}`)
              : path;
            return `
              <article class="card">
                <h3>${title}</h3>
                <pre>${content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</pre>
              </article>
            `;
          })
          .join('');

        container.innerHTML = html;
      }

      function extractSupplementNumber(path) {
        const match = path.match(/supplement\/supplement_(\d+)\.xlsx$/i);
        return match ? Number(match[1]) : Number.POSITIVE_INFINITY;
      }

      function renderAllPrebuiltSupplements(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;

        const supplementMap = window.PREBUILT_SUPPLEMENTS || {};
        const supplementTitleMap = window.PREBUILT_SUPPLEMENT_TITLES || {};
        const entries = Object.entries(supplementMap)
          .filter(([path]) => path.startsWith('supplement/supplement_') && path.endsWith('.xlsx'))
          .sort((a, b) => extractSupplementNumber(a[0]) - extractSupplementNumber(b[0]));

        if (entries.length === 0) {
          container.textContent = '未找到补充表格预处理数据。请先运行 convert_tables.py。';
          return;
        }

        const html = entries
          .map(([path, tableHtml]) => {
            const num = extractSupplementNumber(path);
            const titleName = Number.isFinite(num) ? supplementTitleMap[String(num)] : '';
            const title = Number.isFinite(num)
              ? (titleName ? `表A${num}：${titleName}` : `表A${num}`)
              : path;
            return `
              <article class="card">
                <h3>${title}</h3>
                <div class="xlsx-wrap">${tableHtml}</div>
              </article>
            `;
          })
          .join('');

        container.innerHTML = html;
      }

      function activateTab(tab) {
        tabs.forEach((item) => {
          const selected = item === tab;
          item.setAttribute('aria-selected', String(selected));
          item.tabIndex = selected ? 0 : -1;
        });

        panels.forEach((panel) => {
          panel.classList.toggle('is-active', panel.id === tab.getAttribute('aria-controls'));
        });
      }

      tabs.forEach((tab) => {
        tab.addEventListener('click', () => activateTab(tab));
        tab.addEventListener('keydown', (event) => {
          if (!['ArrowLeft', 'ArrowRight', 'Home', 'End'].includes(event.key)) {
            return;
          }

          event.preventDefault();
          const currentIndex = tabs.indexOf(tab);
          let nextIndex = currentIndex;

          if (event.key === 'ArrowRight') nextIndex = (currentIndex + 1) % tabs.length;
          if (event.key === 'ArrowLeft') nextIndex = (currentIndex - 1 + tabs.length) % tabs.length;
          if (event.key === 'Home') nextIndex = 0;
          if (event.key === 'End') nextIndex = tabs.length - 1;

          tabs[nextIndex].focus();
          activateTab(tabs[nextIndex]);
        });
      });

      renderAllPrebuiltTables('tables-container');
      renderAllPrebuiltFigures('figures-container');
      renderAllPrebuiltPrompts('prompts-container');
      renderAllPrebuiltSupplements('supplements-container');
    </script>
  </body>
</html>
